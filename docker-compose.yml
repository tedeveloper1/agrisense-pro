version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    ports: ["8000:8000"]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on: [mongo, ai-service]
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/smart_farming
      JWT_SECRET: change_me_in_production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      AI_SERVICE_URL: http://ai-service:8000
    ports: ["5000:5000"]

  frontend:
    build: ./mern-frontend
    restart: unless-stopped
    depends_on: [backend]
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports: ["5173:5173"]

volumes:
  mongo_data:
